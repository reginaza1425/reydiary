<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style src="/css/style.css"></style>
    <style>
        body {
            background-color: #f2f2f2;
            background-image: url('https://www.toptal.com/designers/subtlepatterns/uploads/dot-grid.png');
            background-size: auto;
        }

        body::before {
            content: "📝";
            font-size: 150px;
            opacity: 0.05;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
        }

        .auth-card {
            min-width: 300px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <!-- Login Form -->
    <div id="loginCard" class="card p-4 shadow auth-card">
        <h4 class="text-center mb-3">Masuk ke ReyDiary</h4>
        <input id="email" type="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <button onclick="prosesLoginRey()" class="btn btn-primary w-100">Login</button>
        <p class="text-center mt-3 small">Belum punya akun? <a href="#" onclick="toggleForm()">Daftar</a></p>
    </div>

    <!-- Register Form -->
    <div id="registerCard" class="card p-4 shadow auth-card d-none">
        <h4 class="text-center mb-3">Daftar Akun ReyDiary</h4>
        <input id="regEmail" type="email" class="form-control mb-2" placeholder="Email">
        <input id="regPassword" type="password" class="form-control mb-3" placeholder="Password (min. 6 karakter)">
        <button onclick="register()" class="btn btn-success w-100">Daftar</button>
        <p class="text-center mt-3 small">Sudah punya akun? <a href="#" onclick="toggleForm()">Login</a></p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>


    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6g1LeFdKivGZzhcbT7CGuk9Dx6ZTHcsE",
            authDomain: "diary-82f92.firebaseapp.com",
            projectId: "diary-82f92"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function toggleForm() {
            document.getElementById("loginCard").classList.toggle("d-none");
            document.getElementById("registerCard").classList.toggle("d-none");
        }

        function prosesLoginRey() {
            // Kita langsung tembak .value-nya di sini
            const emailTeks = document.getElementById('email').value.trim();
            const passwordTeks = document.getElementById('password').value;

            console.log("Email yang dikirim:", emailTeks); // Untuk ngecek di console

            auth.signInWithEmailAndPassword(emailTeks, passwordTeks)
                .then(() => {
                    location.href = "home.html";
                })
                .catch(err => {
                    alert("Login gagal: " + err.message);
                });
        }

        function register() {
            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;

            if (password.length < 6) {
                alert("Password minimal 6 karakter.");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Berhasil daftar! Silakan login.");
                    toggleForm(); // balik ke login
                })
                .catch(err => alert("Gagal daftar: " + err.message));
        }
    </script>
</body>

</html>
