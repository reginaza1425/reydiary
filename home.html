<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatatanKu</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/style.css" />

</head>

<body>
  <div class="container py-5">
    <div class="text-end me-4">
      <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
    </div>

    <h1 class="text-center mb-4"><i class="fa-solid fa-book"></i> diary</h1>

    <div class="mb-4">
      <input type="text" id="search" class="form-control" placeholder="Cari catatan...">
    </div>

    <!-- Grid Daftar Catatan -->
    <div class="row" id="noteGrid"></div>
  </div>

  <!-- Floating Button -->
  <button class="btn btn-primary btn-lg rounded-circle shadow-lg d-flex align-items-center justify-content-center"
    id="addNoteBtn" data-bs-toggle="modal" data-bs-target="#noteModal">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- Modal Tambah Catatan -->
  <div class="modal fade" id="noteModal" tabindex="-1" aria-labelledby="noteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="noteModalLabel">Tambah Catatan</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="noteTitle" class="form-label">Judul</label>
            <input type="text" id="noteTitle" class="form-control" placeholder="Judul catatan">
          </div>
          <div class="mb-3">
            <label for="noteDate" class="form-label">Tanggal</label>
            <input type="date" id="noteDate" class="form-control">
          </div>
          <div class="mb-3">
            <label for="noteInput" class="form-label">Isi Catatan</label>
            <textarea id="noteInput" class="form-control" placeholder="Tulis catatan di sini..." rows="4"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn btn-primary" onclick="addNote()">Simpan</button>
        </div>
      </div>
    </div>
  </div>



  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>

</body>

</html>
