<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Catatan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <div class="container py-5">
    <h1 id="noteTitle" class="editable" contenteditable="false"></h1>
    <input type="date" id="noteDate" class="form-control text-muted border-0 p-0 mb-3" readonly />
    <hr>

    <!-- Toolbar Format -->
    <div id="toolbar" class="mb-2 d-none">
      <button class="btn btn-sm btn-outline-dark" onclick="format('bold')"><b>B</b></button>
      <button class="btn btn-sm btn-outline-dark" onclick="format('italic')"><i>I</i></button>
      <button class="btn btn-sm btn-outline-dark" onclick="format('underline')"><u>U</u></button>
      <button class="btn btn-sm btn-outline-dark" onclick="format('insertUnorderedList')">• List</button>
    </div>

    <p id="noteContent" class="editable" contenteditable="false" style="white-space: pre-wrap;"></p>

    <div class="mt-4 d-flex justify-content-between">
      <a href="home.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Kembali</a>
      <div>
        <button id="editBtn" class="btn btn-warning"><i class="fas fa-edit"></i> Edit</button>
        <button id="saveBtn" class="btn btn-success d-none"><i class="fas fa-save"></i> Simpan</button>
        <button id="deleteBtn" class="btn btn-danger"><i class="fas fa-trash"></i> Hapus</button>
      </div>
    </div>
  </div>

  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title" id="deleteModalLabel">Konfirmasi Hapus</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Tutup"></button>
        </div>
        <div class="modal-body">
          Apakah kamu yakin ingin menghapus catatan ini? Tindakan ini tidak dapat dibatalkan.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Hapus</button>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA6g1LeFdKivGZzhcbT7CGuk9Dx6ZTHcsE",
      authDomain: "diary-82f92.firebaseapp.com",
      projectId: "diary-82f92",
      storageBucket: "diary-82f92.appspot.com",  
      messagingSenderId: "315642653157",
      appId: "1:315642653157:web:700c76a0c03f3f5901a70c",
      measurementId: "G-H3S4VPNQPC"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        location.href = "index.html";
      } else {
        initPage(user);
      }
    });

    function initPage(user) {
      const params = new URLSearchParams(window.location.search);
      const noteId = params.get("id");

      const titleEl = document.getElementById("noteTitle");
      const dateEl = document.getElementById("noteDate");
      const contentEl = document.getElementById("noteContent");
      const editBtn = document.getElementById("editBtn");
      const saveBtn = document.getElementById("saveBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

      if (noteId) {
        db.collection("diary").doc(noteId).get().then((doc) => {
          if (doc.exists) {
            const data = doc.data();

            if (data.userId !== user.uid) {
              document.body.innerHTML = "<div class='container py-5'><h3>🚫 Catatan ini bukan milikmu.</h3></div>";
              return;
            }

            titleEl.textContent = data.title;
            dateEl.value = data.date;
            contentEl.innerHTML = data.content;
          } else {
            document.body.innerHTML = "<div class='container py-5'><h3>Catatan tidak ditemukan.</h3></div>";
          }
        });
      }

      editBtn.addEventListener("click", () => {
        titleEl.contentEditable = true;
        contentEl.contentEditable = true;
        titleEl.classList.add("border", "p-2");
        contentEl.classList.add("border", "p-2");

        dateEl.removeAttribute("readonly");
        dateEl.classList.add("border", "p-2");

        document.getElementById("toolbar").classList.remove("d-none");
        editBtn.classList.add("d-none");
        saveBtn.classList.remove("d-none");
      });

      saveBtn.addEventListener("click", () => {
        const updatedTitle = titleEl.textContent.trim();
        const updatedContent = contentEl.innerHTML;
        const updatedDate = dateEl.value;

        db.collection("diary").doc(noteId).update({
          title: updatedTitle,
          date: updatedDate,
          content: updatedContent
        }).then(() => {
          alert("Catatan berhasil diperbarui.");

          titleEl.contentEditable = false;
          contentEl.contentEditable = false;
          titleEl.classList.remove("border", "p-2");
          contentEl.classList.remove("border", "p-2");

          dateEl.setAttribute("readonly", true);
          dateEl.classList.remove("border", "p-2");

          document.getElementById("toolbar").classList.add("d-none");
          editBtn.classList.remove("d-none");
          saveBtn.classList.add("d-none");
        }).catch((error) => {
          alert("Gagal memperbarui catatan: " + error.message);
        });
      });

      deleteBtn.addEventListener("click", () => {
        const modal = new bootstrap.Modal(document.getElementById("deleteModal"));
        modal.show();
      });

      confirmDeleteBtn.addEventListener("click", () => {
        db.collection("diary").doc(noteId).delete().then(() => {
          const modal = bootstrap.Modal.getInstance(document.getElementById("deleteModal"));
          modal.hide();
          alert("Catatan berhasil dihapus.");
          window.location.href = "home.html";
        }).catch((error) => {
          alert("Gagal menghapus catatan: " + error.message);
          console.error(error);
        });
      });
    }

    function format(command) {
      document.execCommand(command, false, null);
    }
  </script>
</body>

</html>
